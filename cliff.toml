[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{%- macro remote_url() -%}{% if remote.owner %}https://github.com/{{ remote.owner }}/{{ remote.repo }}{% else %}https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}{% endif %}{%- endmacro -%}
{% if version %}
{% if previous.version %}\
## [{{ version | trim_start_matches(pat="v") }}]({{ self::remote_url() }}/compare/{{ previous.version }}..{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}

{% for commit in commits %}\
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})){% endif %}
{% endfor %}\
{% endfor %}
{%- endif %}
"""

[git]
sort_commits = "newest"
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
commit_preprocessors = [
    { pattern = '(?m)[ \t]+\(#\d+\)$', replace = "" },
]
commit_parsers = [
    { message = "^chore: bump version", skip = true },
    { message = "^chore: trigger", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^Merge pull request", skip = true },
    { message = "^Merge branch", skip = true },
    { message = "^feat", group = "<!-- 00 -->Features" },
    { message = "^fix", group = "<!-- 01 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 02 -->Performance" },
    { message = "^refactor", group = "<!-- 03 -->Refactor" },
    { message = "^doc", group = "<!-- 04 -->Documentation" },
    { message = "^test", group = "<!-- 05 -->Testing" },
    { message = "^build", group = "<!-- 06 -->Build" },
    { message = "^chore\\(ci\\)", group = "<!-- 07 -->CI" },
    { message = "^ci", group = "<!-- 07 -->CI" },
    { message = "^style", group = "<!-- 08 -->Styling" },
    { message = "^chore\\(deps\\)", group = "<!-- 09 -->Dependencies" },
    { message = "^chore", group = "<!-- 10 -->Miscellaneous" },
    { message = "^revert", group = "<!-- 11 -->Revert" },
]

[remote.github]
owner = "konippi"
repo = "servo-fetch"
