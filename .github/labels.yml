# Type — what kind of work?
- name: "type: bug"
  color: d73a4a
  description: "Something isn't working as documented"
- name: "type: feature"
  color: a2eeef
  description: "New feature or capability (feat:)"
- name: "type: docs"
  color: 0075ca
  description: "Documentation-only change (docs:)"
- name: "type: refactor"
  color: c5def5
  description: "Internal refactor with no user-visible change (refactor:)"
- name: "type: perf"
  color: d4c5f9
  description: "Performance improvement (perf:)"
- name: "type: test"
  color: bfd4f2
  description: "Test-only change (test:)"
- name: "type: deps"
  color: 0366d6
  description: "Dependency updates (chore(deps):)"
- name: "type: ci"
  color: c2e0c6
  description: "GitHub Actions, CI pipeline (ci:)"
- name: "type: build"
  color: c2e0c6
  description: "Build system, release packaging (build:)"
- name: "type: security"
  color: b60205
  description: "Security-sensitive change"
- name: "type: question"
  color: d876e3
  description: "Further information is requested"

# Priority — how urgent?
- name: "priority: high"
  color: e11d21
  description: "Critical or urgent — should be worked on soon"
- name: "priority: medium"
  color: fbca04
  description: "Important, normal priority"
- name: "priority: low"
  color: 0e8a16
  description: "Nice to have, no rush"

# Area — which part of the project?
- name: "area: cli"
  color: 1d76db
  description: "CLI binary, subcommands, flags, installer"
- name: "area: mcp"
  color: 1d76db
  description: "MCP server, protocol, tools"
- name: "area: skill"
  color: 1d76db
  description: "Agent Skills package"
- name: "area: benchmark"
  color: 1d76db
  description: "Benchmark harness, fixtures, runners, measurement methodology"
- name: "area: python-bindings"
  color: 1d76db
  description: "Python bindings (PyO3, maturin, PyPI wheels)"
- name: "area: node-bindings"
  color: 1d76db
  description: "Node.js bindings (TypeScript wrapper, npm packages)"
- name: "area: docker"
  color: 1d76db
  description: "Dockerfile, container image, Docker workflow"

# Status — workflow state
- name: "good first issue"
  color: 7057ff
  description: "Good for newcomers — well-scoped and approachable"
- name: "help wanted"
  color: 008672
  description: "Extra attention or external contributors welcome"
- name: "needs triage"
  color: ededed
  description: "Awaiting initial review (type + area assignment)"
- name: "needs info"
  color: fbca04
  description: "Waiting for more information from the reporter"

# Modifier — orthogonal flags
- name: "breaking change"
  color: ee0701
  description: "Introduces a breaking change (semver-major)"
- name: "release"
  color: ededed
  description: "Release PR opened by release-plz"

# Resolution
- name: "duplicate"
  color: cfd3d7
  description: "Duplicate of another issue or PR"
- name: "wontfix"
  color: ffffff
  description: "Will not be worked on — out of scope or rejected"
