version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    labels: ["type: deps"]
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 7
    groups:
      patch-updates:
        update-types: ["patch"]
  - package-ecosystem: github-actions
    directory: /
    labels: ["type: ci"]
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    cooldown:
      default-days: 7
  - package-ecosystem: docker
    directory: /
    labels: ["type: deps", "area: docker"]
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 7
