name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'konippi' }}
    environment: release-plz
    permissions:
      contents: read
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup update stable
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release-plz-release:
    name: Release-plz Release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'konippi' }}
    environment: release-plz
    permissions:
      contents: read
      id-token: write
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup update stable
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
      - id: release-plz
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - id: tag
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          STEPS_RELEASE_PLZ_OUTPUTS_RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          tag=$(echo "${STEPS_RELEASE_PLZ_OUTPUTS_RELEASES}" | jq -r '.[] | select(.package_name == "servo-fetch-cli") | .tag')
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build ${{ matrix.target }}
    needs: release-plz-release
    if: needs.release-plz-release.outputs.tag != ''
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-pc-windows-msvc
            os: windows-2022
    env:
      RUST_BACKTRACE: 1
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CCACHE: sccache
      TARGET: ${{ matrix.target }}
      TAG: ${{ needs.release-plz-release.outputs.tag }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: refs/tags/${{ needs.release-plz-release.outputs.tag }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      # zizmor: ignore[cache-poisoning] -- maintainer-controlled trigger only (push to main, gated on release-plz creating a release)
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang llvm pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev \
            xvfb libegl1 libgles2 libgl1-mesa-dri mesa-utils \
            libfontconfig1 libfreetype6 libharfbuzz0b libx11-6 libxcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: printf 'LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin\n' >> "$GITHUB_ENV"

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target "$TARGET" -p servo-fetch-cli

      - name: Bundle Windows ANGLE DLLs
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -eu
          shopt -s failglob
          BIN_DIR="target/$TARGET/release"
          cp "$BIN_DIR"/build/mozangle-*/out/libEGL.dll "$BIN_DIR"/
          cp "$BIN_DIR"/build/mozangle-*/out/libGLESv2.dll "$BIN_DIR"/

      - name: Smoke test (CLI only, no network)
        shell: bash
        env:
          BIN_EXT: ${{ runner.os == 'Windows' && '.exe' || '' }}
        run: |
          set -euo pipefail
          BIN="target/$TARGET/release/servo-fetch$BIN_EXT"
          "$BIN" --version | grep -q '^servo-fetch '
          "$BIN" --help >/dev/null

      - name: Determine archive name
        shell: bash
        run: |
          VERSION="${TAG#v}"
          echo "ARCHIVE=servo-fetch-v${VERSION}-${TARGET}" >> "$GITHUB_ENV"

      - name: Build archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eu
          mkdir "$ARCHIVE"
          cp "target/$TARGET/release/servo-fetch" "$ARCHIVE"/
          cp README.md LICENSE-MIT LICENSE-APACHE "$ARCHIVE"/
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"

      - name: Build archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -eu
          mkdir "$ARCHIVE"
          cp "target/$TARGET/release/servo-fetch.exe" "$ARCHIVE"/
          cp "target/$TARGET/release/libEGL.dll" "$ARCHIVE"/
          cp "target/$TARGET/release/libGLESv2.dll" "$ARCHIVE"/
          cp README.md LICENSE-MIT LICENSE-APACHE "$ARCHIVE"/
          7z a "$ARCHIVE.zip" "$ARCHIVE"
          certutil -hashfile "$ARCHIVE.zip" SHA256 > "$ARCHIVE.zip.sha256"

      - name: Attest build provenance (Unix)
        if: runner.os != 'Windows'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARCHIVE }}.tar.gz

      - name: Attest build provenance (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARCHIVE }}.zip

      - name: Upload release archive
        shell: bash
        env:
          ARCHIVE_EXT: ${{ runner.os == 'Windows' && 'zip' || 'tar.gz' }}
        run: |
          set -eu
          gh release upload "$TAG" "$ARCHIVE.$ARCHIVE_EXT" "$ARCHIVE.$ARCHIVE_EXT.sha256" --clobber

      - name: Upload Linux binary for docker job
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/servo-fetch
          if-no-files-found: error
          retention-days: 1

  publish-docker:
    name: Publish Docker image
    needs: [release-plz-release, build-release]
    if: needs.release-plz-release.outputs.tag != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      TAG: ${{ needs.release-plz-release.outputs.tag }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: refs/tags/${{ needs.release-plz-release.outputs.tag }}
          persist-credentials: false

      - name: Compute version and revision
        run: |
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          echo "REVISION=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Download Linux binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*-linux-gnu
          path: artifacts

      - name: Stage binaries for docker buildx
        run: |
          set -euo pipefail
          mkdir -p dist/amd64 dist/arm64
          cp artifacts/binary-x86_64-unknown-linux-gnu/servo-fetch dist/amd64/servo-fetch
          cp artifacts/binary-aarch64-unknown-linux-gnu/servo-fetch dist/arm64/servo-fetch
          chmod +x dist/amd64/servo-fetch dist/arm64/servo-fetch

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-plz-release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-plz-release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.release-plz-release.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(needs.release-plz-release.outputs.tag, '-') }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            REVISION=${{ env.REVISION }}
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes --recursive "ghcr.io/${{ github.repository }}@${DIGEST}"

  trivy-scan:
    name: Scan Docker image
    needs: publish-docker
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      security-events: write
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ needs.publish-docker.outputs.digest }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif
          limit-severities-for-sarif: true
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_DISABLE_VEX_NOTICE: "true"

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  publish-release:
    name: Publish release
    needs: [release-plz-release, build-release, publish-docker, trivy-scan]
    if: needs.release-plz-release.outputs.tag != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      TAG: ${{ needs.release-plz-release.outputs.tag }}
    steps:
      - run: gh release edit "$TAG" --repo "$REPO" --draft=false
