name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      node: ${{ steps.filter.outputs.node }}
      toml: ${{ steps.filter.outputs.toml }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'bindings/python/src/**'
              - 'bindings/python/Cargo.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'clippy.toml'
              - '.rustfmt.toml'
              - 'rust-toolchain.toml'
              - '.config/nextest.toml'
              - &ci '.github/workflows/ci.yml'
            python:
              - 'bindings/python/**'
              - *ci
            node:
              - 'bindings/node/**'
              - *ci
            toml:
              - '**/*.toml'
              - *ci

  cargo-clippy:
    name: cargo clippy
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: ./.github/actions/sccache
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - run: cargo clippy --workspace --locked --all-targets -- -D warnings
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  cargo-test:
    name: cargo test
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - uses: ./.github/actions/sccache
      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: cargo-nextest
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - run: cargo nextest run --workspace --locked --cargo-profile ci --profile ci
      - run: cargo test --workspace --locked --profile ci --doc
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-ci
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 14
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  cargo-fmt:
    name: Format
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly-2026-05-08
          components: rustfmt
      - run: cargo fmt --all --check

  cargo-doc:
    name: Doc
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - uses: ./.github/actions/sccache
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - run: cargo doc --workspace --lib --no-deps --locked
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  taplo:
    name: TOML Lint
    needs: [changes]
    if: needs.changes.outputs.toml == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: taplo-cli
      - run: taplo fmt --check --diff

  cargo-deny:
    name: Licenses & Advisories
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: cargo-deny
      - run: cargo deny check

  cargo-shear:
    name: Unused Dependencies
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: cargo-shear
      - run: cargo shear

  typos:
    name: Spell Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
        with:
          config: typos.toml

  e2e:
    name: E2E
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - uses: ./.github/actions/sccache
      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: cargo-nextest
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - run: cargo nextest run -p servo-fetch-cli --run-ignored only --locked --cargo-profile ci --profile ci-e2e
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-e2e
          path: target/nextest/ci-e2e/junit.xml
          if-no-files-found: ignore
          retention-days: 14
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  python-lint:
    name: Python Lint
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: ruff check
        working-directory: bindings/python
        run: uv run --no-project --with ruff ruff check python tests
      - name: ruff format
        working-directory: bindings/python
        run: uv run --no-project --with ruff ruff format --check python tests
      - name: ty check
        working-directory: bindings/python
        run: uv run --no-project --with ty ty check python

  python-test:
    name: Python Test
    needs: [changes, cargo-test]
    if: ${{ !cancelled() && needs.cargo-test.result != 'failure' && (needs.changes.outputs.python == 'true' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -C debuginfo=0
      RUST_BACKTRACE: 1
      GLIBC_TUNABLES: glibc.rtld.optional_static_tls=16384
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - uses: ./.github/actions/sccache
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - name: Build + Test
        working-directory: bindings/python
        run: |
          uv sync --group test --group lint
          uv run maturin develop --profile ci
          uv run pytest
      - name: Stubtest
        working-directory: bindings/python
        run: |
          uv run python -m mypy.stubtest servo_fetch._native \
            --allowlist .mypy-stubtest-allowlist
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  node-lint:
    name: Node Lint
    needs: [changes]
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: bindings/node/.node-version
      - name: Enable corepack
        run: corepack enable
      - name: Install
        working-directory: bindings/node
        run: pnpm install --no-frozen-lockfile
      - name: Biome
        working-directory: bindings/node
        run: pnpm exec biome ci
      - name: Typecheck
        working-directory: bindings/node
        run: pnpm run typecheck

  node-test:
    name: Node Test (${{ matrix.node }})
    needs: [changes]
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Enable corepack
        run: corepack enable
      - name: Install
        working-directory: bindings/node
        run: pnpm install --no-frozen-lockfile
      - name: Build
        working-directory: bindings/node
        run: pnpm run build
      - name: Test
        working-directory: bindings/node
        run: pnpm test

  node-e2e:
    name: Node E2E
    needs: [changes, cargo-test]
    if: ${{ !cancelled() && needs.cargo-test.result != 'failure' && (needs.changes.outputs.node == 'true' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -C debuginfo=0
      RUST_BACKTRACE: 1
      GLIBC_TUNABLES: glibc.rtld.optional_static_tls=16384
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - uses: ./.github/actions/sccache
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: bindings/node/.node-version
      - name: Enable corepack
        run: corepack enable
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - name: Build servo-fetch binary
        run: cargo build -p servo-fetch-cli --profile ci
      - name: Install
        working-directory: bindings/node
        run: pnpm install --no-frozen-lockfile
      - name: E2E
        working-directory: bindings/node
        env:
          SERVO_FETCH_E2E: "1"
          SERVO_FETCH_BINARY_PATH: ${{ github.workspace }}/target/ci/servo-fetch
        run: pnpm run test:e2e
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  ci-passed:
    name: CI Passed
    if: '!cancelled()'
    needs: [changes, cargo-clippy, cargo-test, cargo-doc, e2e, cargo-fmt, taplo, cargo-deny, cargo-shear, typos, python-lint, python-test, node-lint, node-test, node-e2e]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          # Any failure or cancellation is a hard fail.
          if printf '%s' "$NEEDS" | grep -qE '"result": *"(failure|cancelled)"'; then
            echo "::error::One or more required jobs failed or were cancelled"
            printf '%s\n' "$NEEDS"
            exit 1
          fi
          # `changes` and `typos` have no `if:` guard, so they must succeed.
          for job in changes typos; do
            result=$(printf '%s' "$NEEDS" | python3 -c "import json,sys; print(json.loads(sys.stdin.read())['$job']['result'])")
            if [ "$result" != "success" ]; then
              echo "::error::Required job '$job' did not succeed (result=$result)"
              exit 1
            fi
          done
          echo "All required jobs passed (paths-filter skips are allowed for code-gated jobs)"
