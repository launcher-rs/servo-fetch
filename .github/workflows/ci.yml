name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'bindings/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'clippy.toml'
              - '.rustfmt.toml'
              - 'rust-toolchain.toml'
              - 'taplo.toml'
              - '.config/nextest.toml'
              - '.github/workflows/ci.yml'

  cargo-clippy:
    name: cargo clippy
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: true
      RUSTC_WRAPPER: sccache
      CCACHE: sccache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - run: cargo clippy --workspace --locked --all-targets -- -D warnings
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  cargo-test:
    name: cargo test
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: true
      RUSTC_WRAPPER: sccache
      CCACHE: sccache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@e3134ec54b36203e18f2d1e80652058bd078dd91 # v2.77.3
        with:
          tool: cargo-nextest
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - run: cargo nextest run --workspace --locked --cargo-profile ci --profile ci
      - run: cargo test --workspace --locked --profile ci --doc
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-ci
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 14
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  cargo-fmt:
    name: Format
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly-2026-05-08
          components: rustfmt
      - run: cargo fmt --all --check

  taplo:
    name: TOML Lint
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@e3134ec54b36203e18f2d1e80652058bd078dd91 # v2.77.3
        with:
          tool: taplo-cli
      - run: taplo fmt --check --diff

  cargo-deny:
    name: Licenses & Advisories
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17

  cargo-shear:
    name: Unused Dependencies
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@e3134ec54b36203e18f2d1e80652058bd078dd91 # v2.77.3
        with:
          tool: cargo-shear
      - run: cargo shear

  typos:
    name: Spell Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: crate-ci/typos@5374cbf686e897b15713110e233094e2874de7ef # v1.46.1
        with:
          config: typos.toml

  e2e:
    name: E2E
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: true
      RUSTC_WRAPPER: sccache
      CCACHE: sccache
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@e3134ec54b36203e18f2d1e80652058bd078dd91 # v2.77.3
        with:
          tool: cargo-nextest
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - run: cargo nextest run -p servo-fetch-cli --run-ignored only --locked --cargo-profile ci --profile ci-e2e
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-e2e
          path: target/nextest/ci-e2e/junit.xml
          if-no-files-found: ignore
          retention-days: 14
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  python-lint:
    name: Python Lint
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: ruff check
        working-directory: bindings/python
        run: uv run --no-project --with ruff ruff check python tests
      - name: ruff format
        working-directory: bindings/python
        run: uv run --no-project --with ruff ruff format --check python tests
      - name: ty check
        working-directory: bindings/python
        run: uv run --no-project --with ty ty check python

  python-test:
    name: Python Test
    needs: [changes, cargo-test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: true
      RUSTC_WRAPPER: sccache
      CCACHE: sccache
      RUSTFLAGS: -C debuginfo=0
      RUST_BACKTRACE: 1
      GLIBC_TUNABLES: glibc.rtld.optional_static_tls=16384
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install servo build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev
      - name: Build + Test
        working-directory: bindings/python
        run: |
          uv sync --group test --group lint
          uv run maturin develop --profile ci
          uv run pytest
      - name: Stubtest
        working-directory: bindings/python
        run: |
          uv run python -m mypy.stubtest servo_fetch._native \
            --allowlist .mypy-stubtest-allowlist
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  ci-passed:
    name: CI Passed
    if: '!cancelled()'
    needs: [changes, cargo-clippy, cargo-test, e2e, cargo-fmt, taplo, cargo-deny, cargo-shear, typos, python-lint, python-test]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          # Any failure or cancellation is a hard fail.
          if printf '%s' "$NEEDS" | grep -qE '"result": *"(failure|cancelled)"'; then
            echo "::error::One or more required jobs failed or were cancelled"
            printf '%s\n' "$NEEDS"
            exit 1
          fi
          # `changes` and `typos` have no `if:` guard, so they must succeed.
          for job in changes typos; do
            result=$(printf '%s' "$NEEDS" | python3 -c "import json,sys; print(json.loads(sys.stdin.read())['$job']['result'])")
            if [ "$result" != "success" ]; then
              echo "::error::Required job '$job' did not succeed (result=$result)"
              exit 1
            fi
          done
          echo "All required jobs passed (paths-filter skips are allowed for code-gated jobs)"
